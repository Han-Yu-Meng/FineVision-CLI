build:
    default_preset: release
    defaults:
        build_jobs: 8
        build_output: ~/.fins/install
        cmake_generator: Ninja
        sdk_path: ~/.fins/sdk/sdk
    presets:
        dev:
            description: Development mode
            build_type: Debug
            cmake_args:
                - -DBUILD_TESTS=ON
            sanitize: none
        release:
            description: Release mode
            build_type: Release
            sanitize: none
        profile:
            build_type: RelWithDebInfo
            cmake_args:
                - -DCMAKE_CXX_FLAGS_RELWITHDEBINFO=-O2 -g -fno-omit-frame-pointer
                - -DCMAKE_C_FLAGS_RELWITHDEBINFO=-O2 -g -fno-omit-frame-pointer
            description: Profiling mode for perf
            sanitize: none
        simulate:
            description: Simulation mode
            build_type: RelWithDebInfo
            sanitize: none
local_packages: []
webui:
    host: http://localhost:8080
    token: FINS
